<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渗透测试报告 - {{ report_title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <div class="no-print mb-6 flex justify-end">
            <button onclick="window.print()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                🖨️ 打印报告
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="bg-gradient-to-r from-blue-700 to-blue-900 px-8 py-10 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-4xl font-bold mb-2">渗透测试报告</h1>
                        <p class="text-blue-200 text-lg">{{ report_title }}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-blue-200">生成时间</p>
                        <p class="text-xl font-semibold">{{ generated_at }}</p>
                    </div>
                </div>
            </div>

            <div class="px-8 py-6 border-b border-gray-200 bg-gray-50">
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center">
                        <p class="text-gray-500 text-sm">测试目标</p>
                        <p class="font-semibold text-gray-800">{{ target }}</p>
                    </div>
                    <div class="text-center">
                        <p class="text-gray-500 text-sm">报告类型</p>
                        <p class="font-semibold text-gray-800">渗透测试</p>
                    </div>
                </div>
            </div>

            <div class="px-8 py-8">
                <section class="mb-10">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="w-2 h-8 bg-blue-600 rounded mr-3"></span>
                        测试摘要
                    </h2>
                    <div class="bg-gray-50 rounded-lg p-6">
                        <p class="text-gray-700 leading-relaxed">{{ summary }}</p>
                    </div>
                </section>

                {% if findings %}
                <section class="mb-10">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="w-2 h-8 bg-blue-600 rounded mr-3"></span>
                        发现结果
                    </h2>
                    <div class="space-y-4">
                        {% for finding in findings %}
                        <div class="bg-blue-50 rounded-lg p-4 border-l-4 border-blue-500">
                            <p class="text-gray-700">{{ finding }}</p>
                        </div>
                        {% endfor %}
                    </div>
                </section>
                {% endif %}

                {% if llm_analysis_raw %}
                <section class="mb-10">
                    <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                        <span class="w-2 h-8 bg-blue-600 rounded mr-3"></span>
                        AI 分析报告
                    </h2>
                    <div class="bg-gray-50 rounded-lg p-6">
                        <div class="prose prose-gray max-w-none">
                            <pre class="whitespace-pre-wrap text-gray-700 font-sans">{{ llm_analysis_raw }}</pre>
                        </div>
                    </div>
                </section>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
